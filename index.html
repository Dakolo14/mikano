<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mikano International Limited | Shop Motors &amp; Power on Konga</title>
  <meta name="description" content="Welcome to Mikano on Konga. Choose Mikano Motors for Changan, Deepal and Maxus vehicles, or Mikano Power for generators and backup power systems in Nigeria.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="preload" as="image" href="assets/motorbg.webp" type="image/webp">
</head>
<body class="page-hub">

  <header class="site-header">
    <a href="index.html" class="logo">
      <picture>
        <source srcset="assets/mikano-logo.webp" type="image/webp">
        <img src="assets/mikano-logo.png" alt="Mikano International Limited" decoding="async">
      </picture>
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="motor.html">Motors</a>
      <span class="divider">|</span>
      <a href="power.html">Power Systems</a>
    </nav>
  </header>

  <section class="hub-section" aria-label="Choose your Mikano store">
    <div class="hub-grid">
      <a href="motor.html" class="hub-tile hub-tile--motors">
        <div class="hub-tile-media">
          <picture>
            <source srcset="assets/motorbg.webp" type="image/webp">
            <img src="assets/motorbg.png" alt="" fetchpriority="high" decoding="async">
          </picture>
          <span class="hub-tile-overlay" aria-hidden="true"></span>
        </div>
        <div class="hub-tile-content">
          <h1 class="hub-tile-title">Mikano Motors</h1>
          <span class="hub-tile-btn">Shop Now</span>
        </div>
      </a>

      <a href="power.html" class="hub-tile hub-tile--power">
        <div class="hub-tile-media">
          <picture>
            <source srcset="assets/powerbg.webp" type="image/webp">
            <img src="assets/powerbg.jpg" alt="" loading="lazy" decoding="async">
          </picture>
          <span class="hub-tile-overlay" aria-hidden="true"></span>
        </div>
        <div class="hub-tile-content">
          <h1 class="hub-tile-title">Mikano Power</h1>
          <span class="hub-tile-btn">Shop Now</span>
        </div>
      </a>
    </div>
  </section>

</body>
</html>
